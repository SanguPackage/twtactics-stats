# tw-stats.sangu.be — PHP app + MariaDB.
# Coolify: deploy this repo as an application, set the domain to tw-stats.sangu.be in
# the UI (it injects Traefik routing + TLS).
# Secrets (${...}) come from env: Coolify injects them per-app in prod; locally use a
# git-ignored .env beside this file (see .env.example).
services:
  php:
    build: .
    container_name: tw-stats
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_NAME: sangu_betwtactics
      DB_USER: sangu_betwtactics
      DB_PASS: ${TWSTATS_DB_PASSWORD}

  mariadb:
    # Seed (db/init/*.sql) is baked into the image — Coolify compose deploys don't
    # populate relative bind mounts from the repo, so /docker-entrypoint-initdb.d
    # was empty and the ~16.5k-row import never ran. Building it in fixes that.
    build: ./db
    container_name: tw-stats-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: sangu_betwtactics
      MARIADB_USER: sangu_betwtactics
      MARIADB_PASSWORD: ${TWSTATS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${TWSTATS_ROOT_PASSWORD}
    volumes:
      - twstats_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  twstats_db:
