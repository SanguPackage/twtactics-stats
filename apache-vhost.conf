<VirtualHost *:80>
	# The stats dashboard is the site root (was previously under /stats/).
	DocumentRoot /var/www/html/stats

	# These three live one level above the docroot. The first two are the ingestion
	# endpoints the released TW Tactics desktop clients POST to — their URLs are baked
	# into shipped binaries (see TWTactics InternalStructure.cs / AboutForm.cs) and must
	# stay at the root path. /health.php is the Coolify/Docker probe. Alias them back in.
	Alias /twtacticsusage.php /var/www/html/twtacticsusage.php
	Alias /registertactics.php /var/www/html/registertactics.php
	Alias /health.php /var/www/html/health.php

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
